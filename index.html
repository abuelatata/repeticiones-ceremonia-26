<!doctype html>
<html lang="es">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pedidos Ceremonia 26</title>

<style>

:root{
--bg:#f5efe6;
--card:#ffffff;
--text:#5f4636;
--accent:#7fb9b3;
--border:#e6d6c6;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Georgia, serif;
background:var(--bg);
color:var(--text);
}

/* TOPBAR */

.topbar{
position:sticky;
top:0;
z-index:10;
background:white;
border-bottom:1px solid var(--border);
padding:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:center;
}

button{
border:1px solid var(--border);
background:white;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#f7f7f7;
}

.search{
flex:1;
min-width:160px;
padding:8px;
border:1px solid var(--border);
border-radius:6px;
}

/* GRID */

.grid{
padding:20px;
display:grid;
gap:20px;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
max-width:1400px;
margin:auto;
}

/* CARD */

.card{
background:var(--card);
border-radius:12px;
overflow:hidden;
box-shadow:0 6px 20px rgba(0,0,0,0.06);
cursor:pointer;
transition:.2s;
}

.card:hover{
transform:translateY(-3px);
}

.card img{
width:100%;
height:260px;
object-fit:cover;
display:block;
}

.info{
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:15px;
}

/* TALLAS */

.sizes{
display:none;
padding:10px;
border-top:1px solid var(--border);
}

.card.open .sizes{
display:block;
}

.size-row{
display:flex;
justify-content:space-between;
align-items:center;
margin:6px 0;
}

.qty{
display:flex;
gap:6px;
align-items:center;
}

.qty button{
width:26px;
height:26px;
padding:0;
font-weight:bold;
}

.qty span{
width:24px;
text-align:center;
}

/* RESPONSIVE */

@media (max-width:600px){

.grid{
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.card img{
height:180px;
}

}

</style>

</head>

<body>

<div class="topbar">

<button>← Área profesional</button>

<button>Repeticiones</button>

<button>Stock disponible</button>

<input class="search" placeholder="Buscar referencia">

</div>


<div class="grid" id="grid">


<div class="card">

<img src="images/2500401.jpg">

<div class="info">

<span>2500401</span>
<span>€78</span>

</div>

<div class="sizes">

<div class="size-row">
<span>4</span>
<div class="qty">
<button>-</button>
<span>0</span>
<button>+</button>
</div>
</div>

<div class="size-row">
<span>6</span>
<div class="qty">
<button>-</button>
<span>0</span>
<button>+</button>
</div>
</div>

<div class="size-row">
<span>8</span>
<div class="qty">
<button>-</button>
<span>0</span>
<button>+</button>
</div>
</div>

</div>

</div>



<div class="card">

<img src="images/2500402.jpg">

<div class="info">

<span>2500402</span>
<span>€82</span>

</div>

<div class="sizes">

<div class="size-row">
<span>4</span>
<div class="qty">
<button>-</button>
<span>0</span>
<button>+</button>
</div>
</div>

<div class="size-row">
<span>6</span>
<div class="qty">
<button>-</button>
<span>0</span>
<button>+</button>
</div>
</div>

<div class="size-row">
<span>8</span>
<div class="qty">
<button>-</button>
<span>0</span>
<button>+</button>
</div>
</div>

</div>

</div>


</div>


<script>

/* abrir card */

document.querySelectorAll(".card").forEach(card=>{

card.addEventListener("click",e=>{

if(e.target.tagName==="BUTTON") return;

card.classList.toggle("open")

})

})


/* cantidad */

document.querySelectorAll(".qty button").forEach(btn=>{

btn.addEventListener("click",e=>{

e.stopPropagation()

let span=btn.parentElement.querySelector("span")
let v=parseInt(span.textContent)

if(btn.textContent==="+") v++
if(btn.textContent==="-" && v>0) v--

span.textContent=v

})

})

</script>


</body>
</html>
